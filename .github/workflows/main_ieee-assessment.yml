name: Build and deploy Node.js app to Azure Web App - ieee-assessment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          retention-days: 1
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify build structure after download
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== .next folder ==="
          ls -la .next/ || echo ".next NOT FOUND"
          echo "=== .next/static ==="
          ls -la .next/static/ || echo ".next/static NOT FOUND"
          echo "=== public folder ==="
          ls -la public/ || echo "public NOT FOUND"
          echo "=== server.js ==="
          ls -la server.js || echo "server.js NOT FOUND"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ieee-assessment'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_307E4D9077DE4A189F549F24CDF26967 }}
          package: .